services:
  - type: web
    name: rag-website-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run src/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHONPATH
        value: .:/opt/render/project/src/src
